apply plugin: 'com.android.application'

android {
    namespace "com.gazlaws.codeboard"
    compileSdkVersion 34
    buildToolsVersion '34.0.0'

    defaultConfig {
        // Fork ID: different from the original (com.gazlaws.codeboard) so this app
        // installs alongside the Play Store CodeBoard instead of replacing it.
        applicationId "com.gazlaws.codeboard.fork"
        minSdkVersion 23
        targetSdk 35
        versionCode 24
        versionName "6.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }
    signingConfigs {
        // Fixed debug signing, so every build is signed with the SAME key and a new
        // APK installs over an older one without an uninstall. Three sources, in
        // priority order:
        //   1. CI secrets: GitHub Actions decodes a keystore and passes these env
        //      vars (use this if you would rather keep the keystore out of the repo).
        //   2. The committed debug.keystore at the repo root (standard debug creds).
        //   3. Otherwise AGP's auto-generated debug keystore.
        // A *debug* keystore is not sensitive (its credentials are public, by design).
        // Never commit a *release* keystore. Use secrets for release signing.
        debug {
            def ksPath = System.getenv("DEBUG_KEYSTORE_PATH")
            def ksPass = System.getenv("DEBUG_KEYSTORE_PASSWORD")
            def repoKeystore = rootProject.file("debug.keystore")
            if (ksPath != null && !ksPath.trim().isEmpty() && file(ksPath).exists()) {
                storeFile file(ksPath)
                storePassword ksPass
                keyAlias System.getenv("DEBUG_KEY_ALIAS")
                keyPassword System.getenv("DEBUG_KEY_PASSWORD")
            } else if (repoKeystore.exists()) {
                storeFile repoKeystore
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        // Source files now contain accented and IPA literals; pin the encoding so the
        // compiler reads them correctly regardless of the build machine's default.
        encoding = 'UTF-8'
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }
    // Gradle automatically adds 'android.test.runner' as a dependency.
    useLibrary 'android.test.runner'

    useLibrary 'android.test.base'
    useLibrary 'android.test.mock'
    lint {
        checkReleaseBuilds false
    }
}

repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {

    api 'androidx.appcompat:appcompat:1.7.0'
    api 'androidx.legacy:legacy-support-v13:1.0.0'
    api 'androidx.preference:preference:1.2.1'
    api 'androidx.preference:preference:1.2.1'

    implementation 'com.google.android.material:material:1.12.0'

    //https://github.com/AppIntro/AppIntro
    implementation 'com.github.AppIntro:AppIntro:6.3.1'

    //Colour picker
    //implementation 'com.pes.materialcolorpicker:library:1.2.5'
    implementation 'com.github.evilbunny2008:android-material-color-picker-dialog:1.3.7'

    // Required for local unit tests (JUnit 4 framework)
    testImplementation 'junit:junit:4.13.2'

    // Required for instrumented tests
    implementation 'androidx.annotation:annotation:1.9.1'
    androidTestImplementation 'androidx.annotation:annotation:1.9.1'


    // Core library
    androidTestImplementation 'androidx.test:core:1.6.1'

    // AndroidJUnitRunner and JUnit Rules
    androidTestImplementation 'androidx.test:runner:1.6.2'

    androidTestImplementation 'androidx.test.ext:junit:1.2.1'

}
