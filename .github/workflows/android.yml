name: Build APK

# Builds an installable debug APK on every push and lets you run it on demand
# from the Actions tab ("Run workflow"). Modelled on the working workflow in
# wjeroen/TrackyTime, adapted for codeboard (no signing secrets required).

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codeboard-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
